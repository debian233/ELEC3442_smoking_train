<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Smoking Detection Dashboard</title>

  <link rel="stylesheet" href="/static/style.css" />
  <script src="/static/app.js" defer></script>
</head>

<body>
  <header class="header">
    <div class="wrap headerRow">
      <div class="brand">
        <span class="dot"></span>
        <h1>Smoking Detection</h1>
      </div>
      <div class="headerStats">
        <div class="stat">
          <span class="statLabel">Total</span>
          <span class="statValue" id="statTotal">–</span>
        </div>
        <div class="stat">
          <span class="statLabel">Latest</span>
          <span class="statValue" id="statLatest">–</span>
        </div>
        <div class="stat liveStat" id="liveIndicator">
          <span class="statLabel">Status</span>
          <span class="statValue"><span class="liveDot"></span><span id="liveText">Live</span></span>
        </div>
      </div>
    </div>
  </header>

  <main class="wrap layout">
    <!-- LEFT: filters + table -->
    <section class="card tableCard">
      <div class="cardHead">
        <h2>Detections</h2>
        <span class="updated" id="lastUpdated"></span>
      </div>

      <div class="controls">
        <div>
          <label>Class</label>
          <select id="className">
            <option value="">All classes</option>
            <option value="smoking">smoking</option>
            <option value="Person">Person</option>
            <option value="Cigarette">Cigarette</option>
            <option value="Smoke">Smoke</option>
            <option value="Vape">Vape</option>
          </select>
        </div>

        <div>
          <label>Min confidence</label>
          <input id="minConf" type="number" step="0.01" min="0" max="1" placeholder="e.g. 0.40" />
        </div>

        <div>
          <label>Rows</label>
          <select id="limit">
            <option value="25">25</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
            <option value="250">250</option>
          </select>
        </div>

        <div class="btnRow">
          <button id="apply" class="primary">Apply</button>
          <button id="toggleRefresh" class="ghost">Pause</button>
        </div>
      </div>

      <div class="tableWrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Time</th>
              <th>Class</th>
              <th>Confidence</th>
              <th class="right">Temp</th>
              <th>Location</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="6" class="muted">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- RIGHT: sticky preview -->
    <aside class="card previewCard">
      <div class="cardHead">
        <h2>Preview</h2>
        <a id="openImage" href="#" target="_blank" class="openLink" style="display:none;">Open ↗</a>
      </div>
      <div class="imageWrap">
        <img id="previewImg" alt="Detection image" />
        <div id="emptyState" class="emptyState">
          <div class="emptyIcon">📷</div>
          <div class="emptyText">Select a row to preview</div>
        </div>
      </div>
      <div class="previewMeta" id="previewMeta"></div>
    </aside>
  </main>
</body>
</html>
