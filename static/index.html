<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Smoking Detection Dashboard</title>

  <link rel="stylesheet" href="/static/style.css" />
  <script src="/static/app.js" defer></script>
</head>

<body>
  <header class="header">
    <div class="wrap">
      <h1>Smoking Detection Dashboard</h1>
    </div>
  </header>

  <main class="wrap">
    <section class="card">
      <h2>Detections</h2>

      <div class="controls">
        <div>
          <label>Class</label>
          <select id="className">
            <option value="">All</option>
            <option value="smoking">smoking</option>
            <option value="Person">Person</option>
            <option value="Cigarette">Cigarette</option>
            <option value="Smoke">Smoke</option>
            <option value="Vape">Vape</option>
          </select>
        </div>

        <div>
          <label>Min confidence</label>
          <input id="minConf" type="number" step="0.01" min="0" max="1" placeholder="e.g. 0.40" />
        </div>

        <div>
          <label>Rows</label>
          <select id="limit">
            <option value="25">25</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
            <option value="250">250</option>
          </select>
        </div>

        <div class="btnRow">
          <button id="apply">Apply</button>
          <button id="toggleRefresh">Pause</button>
        </div>
      </div>

      <div class="tableWrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Time</th>
              <th class="right">Confidence</th>
              <th class="right">Temp</th>
              <th>Location</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="5" class="muted">Loading…</td></tr>
          </tbody>
        </table>
      </div>

      <!-- Big image box only (no "Preview" title, no helper text) -->
      <div class="imageBox">
        <a id="openImage" href="#" target="_blank" class="openLink" style="display:none;">Open image</a>
        <div class="imageWrap">
          <img id="previewImg" alt="Detection image" />
        </div>
      </div>

    </section>
  </main>
</body>
</html>
